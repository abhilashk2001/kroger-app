# One command - `docker compose up` - boots the whole stack: Postgres, the API,
# and the React web app, all on one private network where they reach each other
# by service name (db, api, web).

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Postgres database. Uses the official ready-made image - no Dockerfile needed.
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: kroger-db
    restart: unless-stopped
    environment:
      # These are read from your .env file by Compose.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # "host:container" - lets you connect from your Mac (e.g. a DB GUI) on 5432.
      - "5432:5432"
    volumes:
      # Named volume = the data survives `docker compose down` and restarts.
      - db_data:/var/lib/postgresql/data
      # Init scripts run once on a fresh volume (creates the test database).
      - ./data/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Other services wait until this reports "healthy" before starting.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # Express + TypeScript API. Built from a custom Dockerfile (added in Step 3).
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kroger-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy   # don't start until Postgres is ready
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL}
      API_PORT: ${API_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      # Bind-mount the source for hot-reload: edits on your Mac appear in the container.
      - ./apps/api:/app
      # Anonymous volume keeps the container's node_modules from being hidden by the
      # bind-mount above (your Mac folder has no node_modules; the container does).
      - /app/node_modules
      # Mount the sample data (read-only) so the loader can read it inside the container.
      - ./data:/data:ro
    command: npm run dev

  # ─────────────────────────────────────────────────────────────────────────
  # React + Vite web app. Built from a custom Dockerfile (added in Step 4).
  # ─────────────────────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: kroger-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "${WEB_PORT}:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

  # ─────────────────────────────────────────────────────────────────────────
  # Offline ML jobs (Python). Behind the "ml" profile, so `docker compose up`
  # does NOT start it - the runtime stays a pure TypeScript API. Run on demand:
  #   docker compose run --rm ml python basket_analysis.py
  #   docker compose run --rm ml python churn.py
  # ─────────────────────────────────────────────────────────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    profiles: ["ml"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Python builds its own connection from these (reaches Postgres as host "db").
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Bind-mount the ML source so edits are picked up without a rebuild.
      - ./ml:/app

# Declares the named volume used by the db service above.
volumes:
  db_data:
