# Local smoke test of the PRODUCTION image — the single container (Express serving
# the React build) against a throwaway Postgres. Mirrors how Azure will run it.
#
#   docker compose -f docker-compose.prod.yml up --build
#   open http://localhost:8080
#   docker compose -f docker-compose.prod.yml down -v
#
# Runs alongside the dev stack: the app is published on 8080 (dev API uses 3000),
# and this Postgres is internal-only (no published port).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      API_PORT: 3000
    ports:
      - "8080:3000"
